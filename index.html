<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi QR - Auto Scan</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .header { text-align: center; margin-bottom: 10px; }
        .header .icon { font-size: 40px; }
        .header h1 { color: #667eea; font-size: 18px; margin: 5px 0; }
        .header p { color: #666; font-size: 12px; }
        
        /* Camera */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        #reader video { border-radius: 15px; }
        
        .camera-box { 
            background: #000; border-radius: 15px; margin: 10px 0; 
            min-height: 280px; position: relative;
        }
        
        /* Scanner overlay */
        .scanner-status {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .scanner-status .ready {
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        .scanner-status .ready .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
            margin-right: 8px;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        
        /* Flash effect */
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        .flash-overlay.show {
            opacity: 0.8;
            transition: opacity 0s;
        }
        
        /* NOTIF AREA */
        .notif-area {
            margin-top: 15px;
        }
        
        .notif-area h3 {
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notif-area h3 .live-dot {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .notif-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .notif-list li {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notif-list li.success {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }
        
        .notif-list li.error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }
        
        .notif-list .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .notif-list li.error .avatar {
            background: #dc3545;
        }
        
        .notif-list .info { flex: 1; }
        .notif-list .nama { font-weight: 600; color: #333; }
        .notif-list .msg { font-size: 11px; color: #666; }
        
        .notif-list .icon-status {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .empty-notif {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 15px;
        }
        
        /* Buttons */
        .btn {
            display: block; width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; margin: 8px 0; transition: all 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-camera { background: #28a745; color: white; font-size: 15px; padding: 14px; }
        .btn-outline { background: white; color: #667eea; border: 2px solid #667eea; }
        
        /* Counter */
        .counter-box {
            display: flex;
            justify-content: space-around;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .counter-box .count {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        
        .counter-box .label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }
        
        /* Test mode */
        .test-mode {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
            display: none;
        }
        
        .debug-panel {
            background: #1e1e1e; color: #0f0; padding: 8px; border-radius: 8px;
            font-family: monospace; font-size: 10px; margin-top: 8px;
            max-height: 80px; overflow-y: auto; line-height: 1.4;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <h1>Scan QR - Auto Absen</h1>
            <p>Scan QR → Langsung Absen ✅</p>
        </div>
        
        <!-- Test mode indicator -->
        <div class="test-mode" id="testMode">⚠️ TEST MODE: Klik 2x untuk test manual</div>
        
        <!-- Counter -->
        <div class="counter-box">
            <div>
                <div class="count" id="countSuccess">0</div>
                <div class="label">✅ Sukses</div>
            </div>
            <div>
                <div class="count" id="countError">0</div>
                <div class="label">❌ Gagal</div>
            </div>
            <div>
                <div class="count" id="countTotal">0</div>
                <div class="label">📊 Total</div>
            </div>
        </div>
        
        <!-- Camera -->
        <div class="camera-box" id="cameraBox">
            <div id="reader"></div>
            <div class="scanner-status">
                <div class="ready" id="scannerStatus">
                    <span class="dot"></span> Arahkan QR Code
                </div>
            </div>
        </div>
        
        <button id="btnCamera" class="btn btn-camera" onclick="startCamera()">
            📸 Mulai Kamera
        </button>
        
        <button id="btnRetry" class="btn btn-outline" onclick="startCamera()" style="display:none;">
            🔄 Mulai Ulang Kamera
        </button>
        
        <!-- NOTIF AREA -->
        <div class="notif-area">
            <h3><span class="live-dot"></span> Notifikasi</h3>
            <ul class="notif-list" id="notifList">
                <li class="empty-notif">📭 Menunggu scan QR...</li>
            </ul>
        </div>
        
        <div class="debug-panel" id="debugPanel">🔍 Ready</div>
    </div>
    
    <!-- Flash overlay -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <script>
        // ⚠️ GANTI URL INI
        const API_URL = 'YOUR_APPS_SCRIPT_URL';
        
        let scanner = null;
        let isProcessing = false;
        let countSuccess = 0;
        let countError = 0;
        let notifList = [];
        
        // LOG
        function log(msg, cls) {
            const p = document.getElementById('debugPanel');
            p.style.display = 'block';
            p.innerHTML += `<br><span style="color:${cls==='err'?'#f44':cls==='ok'?'#0f0':'#fff'}">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
            p.scrollTop = p.scrollHeight;
            console.log(msg);
        }
        
        // API CALL
        function callAPI(action, params) {
            return new Promise((resolve, reject) => {
                const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
                
                window[cb] = r => {
                    delete window[cb];
                    const s = document.getElementById(cb);
                    if (s) s.remove();
                    resolve(r);
                };
                
                const qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
                const url = API_URL + '?action=' + action + '&callback=' + cb + '&' + qs;
                
                const s = document.createElement('script');
                s.id = cb;
                s.src = url;
                s.onerror = () => { delete window[cb]; reject(new Error('Network')); };
                document.body.appendChild(s);
                
                setTimeout(() => { if (window[cb]) { delete window[cb]; reject(new Error('Timeout')); } }, 10000);
            });
        }
        
        // FLASH
        function flash() {
            const el = document.getElementById('flashOverlay');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 150);
        }
        
        // NOTIF
        function addNotif(nama, msg, type) {
            const waktu = new Date().toLocaleTimeString('id-ID');
            
            notifList.unshift({ nama, msg, waktu, type });
            if (notifList.length > 50) notifList = notifList.slice(0, 50);
            
            renderNotif();
        }
        
        function renderNotif() {
            const list = document.getElementById('notifList');
            
            if (notifList.length === 0) {
                list.innerHTML = '<li class="empty-notif">📭 Menunggu scan QR...</li>';
                return;
            }
            
            list.innerHTML = notifList.map((n, i) => `
                <li class="${n.type}" style="animation-delay:${i*0.05}s">
                    <div class="avatar">${n.nama ? n.nama.charAt(0) : '?'}</div>
                    <div class="info">
                        <div class="nama">${n.nama || '-'}</div>
                        <div class="msg">${n.msg} · ${n.waktu}</div>
                    </div>
                    <div class="icon-status">${n.type === 'success' ? '✅' : '❌'}</div>
                </li>
            `).join('');
        }
        
        // UPDATE COUNTER
        function updateCounter() {
            document.getElementById('countSuccess').textContent = countSuccess;
            document.getElementById('countError').textContent = countError;
            document.getElementById('countTotal').textContent = countSuccess + countError;
        }
        
        // RESUME SCANNER
        function resumeScanner() {
            isProcessing = false;
            document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Arahkan QR Code';
            
            if (scanner) {
                scanner.resume().catch(() => {
                    // Jika resume gagal, restart
                    startCamera();
                });
            }
        }
        
        // ============================================
        // AUTO ABSEN
        // ============================================
        async function autoAbsen(decodedText) {
            if (isProcessing) {
                log('Masih processing, skip...');
                return;
            }
            
            isProcessing = true;
            flash();
            
            document.getElementById('scannerStatus').innerHTML = '⏳ Memproses...';
            
            // Decode QR
            let nip = '', nama = '';
            
            try {
                const decoded = JSON.parse(atob(decodedText));
                
                if (decoded.type === 'personal_qr' && decoded.nip && decoded.nama) {
                    // Personal QR - auto absen langsung
                    nip = decoded.nip;
                    nama = decoded.nama;
                } else if (decoded.type === 'session_qr') {
                    // Session QR - perlu input manual
                    log('Session QR detected, need manual input');
                    addNotif('QR Sesi', 'QR ini perlu input manual NIP & Nama', 'error');
                    countError++;
                    updateCounter();
                    document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Gunakan QR Personal';
                    isProcessing = false;
                    return;
                } else {
                    log('Unknown QR type');
                    addNotif('?', 'QR tidak dikenali', 'error');
                    countError++;
                    updateCounter();
                    resumeScanner();
                    return;
                }
            } catch(e) {
                log('Decode error: ' + e.message);
                addNotif('?', 'QR tidak valid', 'error');
                countError++;
                updateCounter();
                resumeScanner();
                return;
            }
            
            // Auto check-in
            try {
                log(`Auto check-in: ${nip} - ${nama}`);
                const result = await callAPI('checkIn', { nip, nama, lat: '', lng: '' });
                
                if (result.success) {
                    addNotif(nama, result.message, 'success');
                    countSuccess++;
                    log(`✅ ${nama} - SUCCESS`);
                } else {
                    addNotif(nama, result.message, 'error');
                    countError++;
                    log(`❌ ${nama} - ${result.message}`);
                }
            } catch(e) {
                log('API error: ' + e.message, 'err');
                addNotif(nama, 'Gagal terhubung', 'error');
                countError++;
            }
            
            updateCounter();
            
            // RESUME scanner untuk peserta berikutnya
            setTimeout(resumeScanner, 800);
        }
        
        // ============================================
        // CAMERA
        // ============================================
        async function startCamera() {
            log('Starting camera...');
            
            document.getElementById('btnCamera').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
            document.getElementById('cameraBox').style.display = 'block';
            document.getElementById('scannerStatus').innerHTML = '⏳ Membuka kamera...';
            
            // Cleanup old
            if (scanner) {
                try { await scanner.stop(); } catch(e) {}
                try { scanner.clear(); } catch(e) {}
                scanner = null;
            }
            
            document.getElementById('reader').innerHTML = '';
            
            if (!navigator.mediaDevices?.getUserMedia) {
                log('No camera API', 'err');
                addNotif('System', 'Browser tidak support kamera', 'error');
                document.getElementById('btnRetry').style.display = 'block';
                return;
            }
            
            try {
                // Test camera
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                stream.getTracks().forEach(t => t.stop());
                log('Camera OK', 'ok');
                
                scanner = new Html5Qrcode("reader");
                
                await scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (text) => {
                        // QR Detected!
                        log('QR Detected', 'ok');
                        scanner.pause();
                        autoAbsen(text);
                    },
                    () => {} // ignore scan failures
                );
                
                log('Scanner active', 'ok');
                document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Arahkan QR Code';
                
            } catch(err) {
                log('Camera error: ' + err.message, 'err');
                addNotif('System', 'Gagal akses kamera: ' + err.message, 'error');
                document.getElementById('cameraBox').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'block';
            }
        }
        
        // ============================================
        // INIT
        // ============================================
        window.addEventListener('load', () => {
            log('🚀 Auto Scan Ready');
            
            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                log('Mobile - auto start');
                setTimeout(startCamera, 600);
            }
        });
        
        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (scanner) scanner.pause();
            } else {
                if (scanner && !isProcessing) scanner.resume();
            }
        });
        
        // Handle app resume (HP)
        window.addEventListener('focus', () => {
            if (scanner && !isProcessing) {
                scanner.resume().catch(() => startCamera());
            }
        });
    </script>
</body>
</html>
