<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi QR</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header { text-align: center; margin-bottom: 15px; }
        .header .icon { font-size: 45px; }
        .header h1 { color: #667eea; font-size: 20px; margin: 8px 0; }
        .header p { color: #666; font-size: 13px; }
        
        .tabs {
            display: flex; gap: 5px; margin-bottom: 15px;
            background: #f0f0f0; border-radius: 12px; padding: 4px;
        }
        
        .tab {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            background: transparent; cursor: pointer;
            font-family: inherit; font-weight: 600; font-size: 13px;
            color: #666; transition: all 0.3s;
        }
        
        .tab.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .status {
            padding: 12px; border-radius: 10px; margin: 10px 0;
            font-weight: 500; font-size: 14px; text-align: center; display: none;
        }
        
        .status-success { background: #d4edda; color: #155724; display: block; }
        .status-error { background: #f8d7da; color: #721c24; display: block; }
        .status-warning { background: #fff3cd; color: #856404; display: block; }
        .status-info { background: #d1ecf1; color: #0c5460; display: block; }
        
        .btn {
            display: block; width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: inherit; margin: 8px 0; transition: all 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-camera { background: #28a745; color: white; font-size: 16px; padding: 16px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-outline { background: white; color: #667eea; border: 2px solid #667eea; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #333; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
        
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 15px; font-family: inherit;
        }
        
        .form-group textarea { resize: vertical; min-height: 70px; font-size: 12px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        
        .alert {
            padding: 12px; border-radius: 10px; margin: 10px 0; font-size: 13px;
            line-height: 1.5; background: #d1ecf1; color: #0c5460;
        }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        #reader video { border-radius: 15px; }
        
        .camera-box { background: #000; border-radius: 15px; margin: 10px 0; min-height: 300px; }
        
        .success-box { text-align: center; padding: 20px; }
        .success-box .icon { font-size: 80px; animation: pop 0.5s ease; }
        @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
        
        /* NOTIF TERBARU */
        .recent-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            border: 2px solid #e9ecef;
        }
        
        .recent-box h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .recent-box h3 .live-dot {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .recent-list {
            list-style: none;
        }
        
        .recent-list li {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }
        
        .recent-list li:first-child {
            background: #d4edda;
            font-weight: 600;
            border: 1px solid #c3e6cb;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .recent-list .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        
        .recent-list .info {
            flex: 1;
        }
        
        .recent-list .nama {
            font-weight: 600;
            color: #333;
        }
        
        .recent-list .waktu {
            font-size: 11px;
            color: #666;
        }
        
        .recent-list .status-icon {
            font-size: 18px;
        }
        
        .empty-recent {
            text-align: center;
            color: #999;
            font-size: 13px;
            padding: 10px;
        }
        
        .debug-panel {
            background: #1e1e1e; color: #0f0; padding: 10px; border-radius: 10px;
            font-family: monospace; font-size: 10px; margin-top: 10px;
            max-height: 100px; overflow-y: auto; line-height: 1.6;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <h1>Absensi QR Code</h1>
            <p>Scan QR atau Input Kode</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('scan')" id="tabScan">📸 Scan QR</button>
            <button class="tab" onclick="switchTab('manual')" id="tabManual">⌨️ Input Kode</button>
        </div>
        
        <div id="statusMsg" class="status"></div>
        
        <!-- SCAN MODE -->
        <div id="scanSection">
            <div id="cameraBox" class="camera-box" style="display:none;">
                <div id="reader"></div>
            </div>
            <button id="btnCamera" class="btn btn-camera" onclick="startCamera()">
                📸 Buka Kamera
            </button>
            
            <div id="formScan" style="display:none;">
                <div class="status status-success" style="display:block;">✅ QR Berhasil Dipindai!</div>
                <div class="form-group">
                    <label>NIP</label>
                    <input type="text" id="nip" placeholder="Masukkan NIP" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan Nama" autocomplete="off" />
                </div>
                <button class="btn btn-primary" onclick="doAbsen('scan')">✅ Absen</button>
                <button class="btn btn-outline" onclick="resetScan()">🔄 Ulang</button>
            </div>
            
            <!-- NOTIF TERBARU -->
            <div class="recent-box" id="recentBox">
                <h3><span class="live-dot"></span> Yang Baru Absen</h3>
                <ul class="recent-list" id="recentList">
                    <li class="empty-recent">📭 Menunggu absensi...</li>
                </ul>
            </div>
        </div>
        
        <!-- MANUAL MODE -->
        <div id="manualSection" style="display:none;">
            <div class="alert">📋 Paste Encoded Data dari Admin, lalu isi NIP & Nama</div>
            <div class="form-group">
                <label>Encoded Data</label>
                <textarea id="kodeInput" placeholder="Paste encoded data..."></textarea>
            </div>
            <div class="form-group">
                <label>NIP</label>
                <input type="text" id="nipManual" placeholder="Masukkan NIP" autocomplete="off" />
            </div>
            <div class="form-group">
                <label>Nama</label>
                <input type="text" id="namaManual" placeholder="Masukkan Nama" autocomplete="off" />
            </div>
            <button class="btn btn-primary" onclick="doAbsen('manual')">✅ Absen</button>
        </div>
        
        <div class="debug-panel" id="debugPanel">🔍 Ready</div>
    </div>

    <script>
        // ⚠️ GANTI DENGAN URL APPS SCRIPT KAMU
        const API_URL = 'https://script.google.com/macros/s/AKfycbzxSCaZecBS6Dfq6Y0WwZMSjjSqUWMcS084fgUqef_8dfFzAzNpozPv8WgmQEZtC9Gg/exec';
        
        let scanner = null;
        let currentQR = null;
        let recentAbsen = [];
        
        // LOG
        function log(msg, cls) {
            const t = new Date().toLocaleTimeString();
            const p = document.getElementById('debugPanel');
            p.style.display = 'block';
            p.innerHTML += `<br><span class="${cls||''}">[${t}] ${msg}</span>`;
            p.scrollTop = p.scrollHeight;
            console.log(msg);
        }
        
        // API CALL
        function callAPI(action, params) {
            return new Promise((resolve, reject) => {
                const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
                
                window[cb] = function(r) {
                    delete window[cb];
                    const s = document.getElementById(cb);
                    if (s) s.remove();
                    resolve(r);
                };
                
                const qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
                const url = API_URL + '?action=' + action + '&callback=' + cb + '&' + qs;
                
                const s = document.createElement('script');
                s.id = cb;
                s.src = url;
                s.onerror = () => { delete window[cb]; reject(new Error('Network error')); };
                document.body.appendChild(s);
                
                setTimeout(() => { 
                    if (window[cb]) { delete window[cb]; reject(new Error('Timeout')); }
                }, 15000);
            });
        }
        
        // ============================================
        // LOAD RECENT ABSEN
        // ============================================
        async function loadRecent() {
            try {
                const data = await callAPI('dashboard', {});
                if (data.success && data.data.length > 0) {
                    recentAbsen = data.data.slice(0, 5);
                    renderRecent();
                }
            } catch(e) {
                // Silent
            }
        }
        
        function renderRecent() {
            const list = document.getElementById('recentList');
            
            if (recentAbsen.length === 0) {
                list.innerHTML = '<li class="empty-recent">📭 Menunggu absensi...</li>';
                return;
            }
            
            list.innerHTML = recentAbsen.map((d, i) => `
                <li style="animation-delay: ${i * 0.1}s">
                    <div class="avatar">${d.nama.charAt(0)}</div>
                    <div class="info">
                        <div class="nama">${d.nama}</div>
                        <div class="waktu">${d.waktu}</div>
                    </div>
                    <div class="status-icon">${i === 0 ? '🆕' : '✅'}</div>
                </li>
            `).join('');
        }
        
        // Tambah absen baru ke list
        function addRecent(nama, waktu) {
            recentAbsen.unshift({ nama, waktu, status: 'Hadir' });
            if (recentAbsen.length > 5) recentAbsen = recentAbsen.slice(0, 5);
            renderRecent();
        }
        
        // ============================================
        // TAB
        // ============================================
        function switchTab(tab) {
            document.getElementById('tabScan').className = tab === 'scan' ? 'tab active' : 'tab';
            document.getElementById('tabManual').className = tab === 'manual' ? 'tab active' : 'tab';
            document.getElementById('scanSection').style.display = tab === 'scan' ? 'block' : 'none';
            document.getElementById('manualSection').style.display = tab === 'manual' ? 'block' : 'none';
            if (tab === 'manual' && scanner) { scanner.stop().catch(()=>{}); }
        }
        
        // ============================================
        // CAMERA
        // ============================================
        async function startCamera() {
            log('📸 Starting camera...');
            document.getElementById('btnCamera').style.display = 'none';
            
            if (!navigator.mediaDevices?.getUserMedia) {
                log('❌ No camera');
                showStatus('❌ Browser tidak support kamera', 'error');
                document.getElementById('btnCamera').style.display = 'block';
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                log('✅ Camera OK!');
                stream.getTracks().forEach(t => t.stop());
                
                document.getElementById('cameraBox').style.display = 'block';
                document.getElementById('reader').innerHTML = '';
                
                scanner = new Html5Qrcode("reader");
                await scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    () => {}
                );
                log('✅ Scanner active');
                
            } catch(err) {
                log('❌ ' + err.message);
                showStatus('❌ ' + err.message, 'error');
                document.getElementById('btnCamera').style.display = 'block';
            }
        }
        
        async function onScanSuccess(decodedText) {
            log('✅ QR Detected!');
            scanner.stop().catch(()=>{});
            document.getElementById('cameraBox').style.display = 'none';
            currentQR = decodedText;
            
            // Coba auto-fill jika personal QR
            try {
                const decoded = JSON.parse(atob(decodedText));
                if (decoded.type === 'personal_qr' && decoded.nip && decoded.nama) {
                    document.getElementById('nip').value = decoded.nip;
                    document.getElementById('nama').value = decoded.nama;
                    showStatus('✅ QR Personal! NIP & Nama terisi otomatis', 'success');
                } else {
                    showStatus('✅ QR Sesi! Isi NIP & Nama Anda', 'success');
                }
            } catch(e) {
                showStatus('✅ QR Terdeteksi! Isi NIP & Nama', 'success');
            }
            
            document.getElementById('formScan').style.display = 'block';
            document.getElementById('nip').focus();
        }
        
        // ============================================
        // ABSEN
        // ============================================
        async function doAbsen(mode) {
            let nip, nama;
            
            if (mode === 'scan') {
                nip = document.getElementById('nip').value.trim();
                nama = document.getElementById('nama').value.trim();
            } else {
                nip = document.getElementById('nipManual').value.trim();
                nama = document.getElementById('namaManual').value.trim();
            }
            
            if (!nip || !nama) {
                showStatus('⚠️ Isi NIP dan Nama!', 'warning');
                return;
            }
            
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = '⏳...';
            
            try {
                const result = await callAPI('checkIn', { nip, nama, lat: '', lng: '' });
                
                if (result.success) {
                    // Tambah ke notif
                    const waktu = new Date().toLocaleTimeString('id-ID');
                    addRecent(nama, waktu);
                    
                    // Tampilkan sukses
                    document.querySelector('.container').innerHTML = `
                        <div class="success-box">
                            <div class="icon">✅</div>
                            <h2 style="color:#155724;">Absensi Berhasil!</h2>
                            <p style="font-size:18px;margin:10px 0;"><strong>${result.message}</strong></p>
                            <p style="color:#666;">${new Date().toLocaleString('id-ID')}</p>
                            <br>
                            <button class="btn btn-outline" onclick="location.reload()">🔄 Kembali</button>
                        </div>
                    `;
                } else {
                    showStatus('❌ ' + result.message, 'error');
                }
            } catch(e) {
                showStatus('❌ Gagal terhubung. Coba lagi.', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = '✅ Absen';
        }
        
        // ============================================
        // HELPERS
        // ============================================
        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.innerHTML = msg;
            el.className = 'status status-' + type;
        }
        
        function resetScan() {
            document.getElementById('formScan').style.display = 'none';
            document.getElementById('statusMsg').className = 'status';
            document.getElementById('nip').value = '';
            document.getElementById('nama').value = '';
            currentQR = null;
            document.getElementById('btnCamera').style.display = 'block';
        }
        
        // ============================================
        // INIT
        // ============================================
        window.addEventListener('load', () => {
            log('🚀 Ready');
            loadRecent();
            
            // Auto camera untuk mobile
            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                log('Mobile detected, auto camera...');
                setTimeout(startCamera, 500);
            }
            
            // Refresh recent every 10 detik
            setInterval(loadRecent, 10000);
        });
    </script>
</body>
</html>
