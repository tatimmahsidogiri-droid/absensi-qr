<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi QR</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header { text-align: center; margin-bottom: 15px; }
        .header .icon { font-size: 45px; }
        .header h1 { color: #667eea; font-size: 20px; margin: 8px 0; }
        .header p { color: #666; font-size: 13px; }
        
        .tabs {
            display: flex; gap: 5px; margin-bottom: 15px;
            background: #f0f0f0; border-radius: 12px; padding: 4px;
        }
        
        .tab {
            flex: 1; padding: 12px 8px; border: none; border-radius: 10px;
            background: transparent; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 13px;
            color: #666; transition: all 0.3s;
        }
        
        .tab.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .status {
            padding: 12px; border-radius: 10px; margin: 10px 0;
            font-weight: 500; font-size: 14px; text-align: center; display: none;
        }
        
        .status-success { background: #d4edda; color: #155724; display: block; }
        .status-error { background: #f8d7da; color: #721c24; display: block; }
        .status-warning { background: #fff3cd; color: #856404; display: block; }
        .status-info { background: #d1ecf1; color: #0c5460; display: block; }
        
        .btn {
            display: block; width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: 'Poppins', sans-serif; margin: 8px 0; transition: all 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-camera { background: #28a745; color: white; font-size: 16px; padding: 16px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-outline { background: white; color: #667eea; border: 2px solid #667eea; }
        
        .form-group { margin-bottom: 12px; }
        
        .form-group label {
            display: block; color: #333; font-weight: 600; margin-bottom: 4px; font-size: 13px;
        }
        
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 15px; font-family: 'Poppins', sans-serif;
        }
        
        .form-group textarea { resize: vertical; min-height: 70px; font-size: 12px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        
        .alert {
            padding: 12px; border-radius: 10px; margin: 10px 0; font-size: 13px;
            line-height: 1.5; background: #d1ecf1; color: #0c5460;
        }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        #reader video { border-radius: 15px; }
        
        .camera-box {
            background: #000; border-radius: 15px; margin: 10px 0;
            position: relative; min-height: 300px;
        }
        
        .debug-panel {
            background: #1e1e1e; color: #00ff00; padding: 12px; border-radius: 10px;
            font-family: monospace; font-size: 10px; margin-top: 15px;
            max-height: 150px; overflow-y: auto; line-height: 1.6;
        }
        
        .debug-panel .err { color: #ff4444; }
        .debug-panel .ok { color: #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <h1>Absensi QR Code</h1>
            <p>Scan QR atau Input Kode Manual</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('scan')" id="tabScanBtn">📸 Scan QR</button>
            <button class="tab" onclick="switchTab('manual')" id="tabManualBtn">⌨️ Input Kode</button>
        </div>
        
        <div id="statusMessage" class="status"></div>
        
        <!-- SCAN TAB -->
        <div id="scanSection">
            <div id="cameraBox" class="camera-box" style="display: none;">
                <div id="reader"></div>
            </div>
            
            <button id="btnStartCamera" class="btn btn-camera" onclick="startCamera()">
                📸 Buka Kamera
            </button>
            
            <div id="formAfterScan" style="display: none;">
                <div class="status status-success" style="display: block; margin-bottom: 12px;">
                    ✅ QR Code berhasil dipindai!
                </div>
                <div class="form-group">
                    <label>NIP</label>
                    <input type="text" id="nip" placeholder="Masukkan NIP" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan Nama" autocomplete="off" />
                </div>
                <button class="btn btn-primary" onclick="doCheckIn()">✅ Absen</button>
                <button class="btn btn-outline" onclick="resetScan()">🔄 Scan Ulang</button>
            </div>
        </div>
        
        <!-- MANUAL TAB -->
        <div id="manualSection" style="display: none;">
            <div class="alert">
                <strong>📋 Cara Input Manual:</strong><br>
                1. Admin generate QR → copy Encoded Data<br>
                2. Paste kode di bawah<br>
                3. Isi NIP & Nama
            </div>
            <div class="form-group">
                <label>Encoded Data</label>
                <textarea id="kodeManual" placeholder="Paste encoded data di sini..."></textarea>
            </div>
            <div class="form-group">
                <label>NIP</label>
                <input type="text" id="nipManual" placeholder="Masukkan NIP" autocomplete="off" />
            </div>
            <div class="form-group">
                <label>Nama</label>
                <input type="text" id="namaManual" placeholder="Masukkan Nama" autocomplete="off" />
            </div>
            <button class="btn btn-primary" onclick="manualCheckIn()">✅ Absen</button>
        </div>
        
        <div class="debug-panel" id="debugPanel">🔍 Ready...</div>
    </div>

    <script>
        // ⚠️⚠️⚠️ GANTI URL INI ⚠️⚠️⚠️
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxSCaZecBS6Dfq6Y0WwZMSjjSqUWMcS084fgUqef_8dfFzAzNpozPv8WgmQEZtC9Gg/exec';
        
        let html5QrCode = null;
        let currentSession = null;
        
        function log(msg, cls = '') {
            const panel = document.getElementById('debugPanel');
            const time = new Date().toLocaleTimeString();
            const icon = cls === 'err' ? '❌' : cls === 'ok' ? '✅' : '📝';
            panel.innerHTML += `<br><span class="${cls}">[${time}] ${icon} ${msg}</span>`;
            panel.scrollTop = panel.scrollHeight;
            console.log(msg);
        }
        
        function callAPI(action, params = {}) {
            return new Promise((resolve, reject) => {
                const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                
                window[cbName] = function(result) {
                    delete window[cbName];
                    const s = document.getElementById(cbName);
                    if (s) s.remove();
                    resolve(result);
                };
                
                const queryString = Object.entries(params)
                    .map(([k, v]) => `${k}=${encodeURIComponent(v)}`)
                    .join('&');
                
                const url = `${APPS_SCRIPT_URL}?action=${action}&callback=${cbName}&${queryString}`;
                
                const script = document.createElement('script');
                script.id = cbName;
                script.src = url;
                script.onerror = () => {
                    delete window[cbName];
                    reject(new Error('Network error'));
                };
                document.body.appendChild(script);
                
                setTimeout(() => {
                    if (window[cbName]) {
                        delete window[cbName];
                        const s = document.getElementById(cbName);
                        if (s) s.remove();
                        reject(new Error('Timeout'));
                    }
                }, 15000);
            });
        }
        
        function switchTab(tab) {
            document.getElementById('tabScanBtn').className = tab === 'scan' ? 'tab active' : 'tab';
            document.getElementById('tabManualBtn').className = tab === 'manual' ? 'tab active' : 'tab';
            document.getElementById('scanSection').style.display = tab === 'scan' ? 'block' : 'none';
            document.getElementById('manualSection').style.display = tab === 'manual' ? 'block' : 'none';
            if (tab === 'manual') stopCamera();
        }
        
        async function startCamera() {
            log('Starting camera...');
            const btn = document.getElementById('btnStartCamera');
            btn.style.display = 'none';
            
            if (!navigator.mediaDevices?.getUserMedia) {
                log('getUserMedia not supported!', 'err');
                showStatus('❌ Browser tidak mendukung', 'error');
                btn.style.display = 'block';
                return;
            }
            
            try {
                log('Requesting camera permission...');
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                log('Camera permission GRANTED!', 'ok');
                stream.getTracks().forEach(t => t.stop());
                
                document.getElementById('cameraBox').style.display = 'block';
                document.getElementById('reader').innerHTML = '';
                
                html5QrCode = new Html5Qrcode("reader");
                
                await html5QrCode.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    () => {}
                );
                
                log('Scanner ACTIVE!', 'ok');
                showStatus('📷 Arahkan kamera ke QR Code', 'info');
                
            } catch(err) {
                log(`Camera error: ${err.name} - ${err.message}`, 'err');
                showStatus('❌ ' + err.message, 'error');
                btn.style.display = 'block';
            }
        }
        
        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => html5QrCode.clear()).catch(() => {});
                html5QrCode = null;
            }
            document.getElementById('cameraBox').style.display = 'none';
        }
        
        async function onScanSuccess(decodedText) {
            log('QR DETECTED!', 'ok');
            stopCamera();
            
            try {
                const result = await callAPI('validateQR', { qrData: decodedText });
                log('Validation: ' + JSON.stringify(result));
                
                if (result.success) {
                    currentSession = result.sessionId;
                    showStatus('✅ QR Valid! Isi data diri.', 'success');
                    document.getElementById('formAfterScan').style.display = 'block';
                    document.getElementById('btnStartCamera').style.display = 'none';
                    document.getElementById('nip').focus();
                } else {
                    showStatus('❌ ' + result.message, 'error');
                    document.getElementById('btnStartCamera').style.display = 'block';
                }
            } catch(err) {
                log('Error: ' + err.message, 'err');
                showStatus('❌ Gagal validasi', 'error');
                document.getElementById('btnStartCamera').style.display = 'block';
            }
        }
        
        async function doCheckIn() {
            const nip = document.getElementById('nip').value.trim();
            const nama = document.getElementById('nama').value.trim();
            
            if (!nip || !nama) {
                showStatus('⚠️ Isi NIP dan Nama!', 'warning');
                return;
            }
            
            const btn = document.querySelector('#formAfterScan .btn-primary');
            btn.disabled = true;
            btn.textContent = '⏳...';
            
            try {
                const result = await callAPI('checkIn', { nip, nama, lat: '', lng: '' });
                log('Result: ' + JSON.stringify(result));
                
                if (result.success) {
                    showStatus('✅ ' + result.message, 'success');
                    setTimeout(resetAll, 3000);
                } else {
                    showStatus('❌ ' + result.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '✅ Absen';
                }
            } catch(err) {
                showStatus('❌ Gagal', 'error');
                btn.disabled = false;
                btn.textContent = '✅ Absen';
            }
        }
        
        async function manualCheckIn() {
            const kode = document.getElementById('kodeManual').value.trim();
            const nip = document.getElementById('nipManual').value.trim();
            const nama = document.getElementById('namaManual').value.trim();
            
            if (!kode || !nip || !nama) {
                showStatus('⚠️ Semua wajib diisi!', 'warning');
                return;
            }
            
            const btn = document.querySelector('#manualSection .btn-primary');
            btn.disabled = true;
            btn.textContent = '⏳...';
            
            try {
                const valid = await callAPI('validateQR', { qrData: kode });
                if (!valid.success) {
                    showStatus('❌ ' + valid.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '✅ Absen';
                    return;
                }
                
                const result = await callAPI('checkIn', { nip, nama, lat: '', lng: '' });
                
                if (result.success) {
                    showStatus('✅ ' + result.message, 'success');
                    setTimeout(resetAll, 3000);
                } else {
                    showStatus('❌ ' + result.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '✅ Absen';
                }
            } catch(err) {
                showStatus('❌ Gagal', 'error');
                btn.disabled = false;
                btn.textContent = '✅ Absen';
            }
        }
        
        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.innerHTML = msg;
            el.className = 'status status-' + type;
        }
        
        function resetScan() {
            stopCamera();
            document.getElementById('formAfterScan').style.display = 'none';
            document.getElementById('statusMessage').className = 'status';
            document.getElementById('nip').value = '';
            document.getElementById('nama').value = '';
            currentSession = null;
            document.getElementById('btnStartCamera').style.display = 'block';
        }
        
        function resetAll() {
            resetScan();
            document.getElementById('kodeManual').value = '';
            document.getElementById('nipManual').value = '';
            document.getElementById('namaManual').value = '';
        }
        
        window.addEventListener('load', () => {
            log('Page loaded');
            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                log('Mobile detected, auto-starting camera...');
                setTimeout(startCamera, 800);
            }
        });
    </script>
</body>
</html>
