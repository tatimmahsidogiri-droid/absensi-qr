<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi QR - Auto Scan</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .header { text-align: center; margin-bottom: 15px; }
        .header .icon { font-size: 40px; }
        .header h1 { color: #667eea; font-size: 18px; margin: 5px 0; }
        .header p { color: #666; font-size: 12px; }
        
        /* Counter */
        .counter-row {
            display: flex;
            justify-content: space-around;
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 14px;
            margin-bottom: 12px;
        }
        
        .counter-row .count-item { flex: 1; }
        .counter-row .count {
            font-size: 26px;
            font-weight: 700;
        }
        
        .counter-row .count-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .count-success .count { color: #10b981; }
        .count-error .count { color: #ef4444; }
        .count-total .count { color: #6366f1; }
        
        /* Camera */
        .camera-box {
            background: #000;
            border-radius: 16px;
            margin: 10px 0;
            min-height: 280px;
            position: relative;
            overflow: hidden;
        }
        
        #reader { width: 100%; border-radius: 16px; overflow: hidden; }
        #reader video { border-radius: 16px; object-fit: cover; }
        
        .scanner-status {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }
        
        .scanner-status .ready {
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        .scanner-status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
            margin-right: 8px;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.4); }
        }
        
        /* Flash */
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        .flash-overlay.show {
            opacity: 0.8;
            transition: opacity 0s;
        }
        
        /* Notif */
        .notif-area { margin-top: 12px; }
        
        .notif-area h3 {
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notif-area h3 .live-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .notif-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
        }
        
        .notif-list li {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notif-list li.success {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
        }
        
        .notif-list li.error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }
        
        .notif-list li.warning {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
        }
        
        .notif-list .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .notif-list li.error .avatar { background: #ef4444; }
        .notif-list li.warning .avatar { background: #f59e0b; }
        
        .notif-list .info { flex: 1; min-width: 0; }
        .notif-list .nama { font-weight: 600; color: #1e293b; }
        .notif-list .jabatan { font-size: 11px; color: #6366f1; font-weight: 500; }
        .notif-list .msg { font-size: 11px; color: #64748b; }
        
        .notif-list .icon-status { font-size: 20px; flex-shrink: 0; }
        
        /* Buttons */
        .btn {
            display: block; width: 100%; padding: 12px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; margin: 8px 0; transition: all 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-camera { background: #10b981; color: white; font-size: 15px; padding: 14px; }
        .btn-outline { background: white; color: #6366f1; border: 2px solid #e2e8f0; }
        
        .empty-notif { text-align: center; color: #94a3b8; font-size: 12px; padding: 15px; }
        
        /* Debug */
        .debug-panel {
            background: #1e1e1e; color: #0f0; padding: 8px; border-radius: 8px;
            font-family: monospace; font-size: 9px; margin-top: 8px;
            max-height: 60px; overflow-y: auto; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <h1>Scan QR · Auto Absen</h1>
            <p>Scan → Langsung Hadir ✅</p>
        </div>
        
        <!-- Counter -->
        <div class="counter-row">
            <div class="count-item count-success">
                <div class="count" id="countSuccess">0</div>
                <div class="count-label">✅ Sukses</div>
            </div>
            <div class="count-item count-error">
                <div class="count" id="countError">0</div>
                <div class="count-label">❌ Gagal</div>
            </div>
            <div class="count-item count-total">
                <div class="count" id="countHadir">0</div>
                <div class="count-label">👥 Hadir</div>
            </div>
        </div>
        
        <!-- Camera -->
        <div class="camera-box" id="cameraBox">
            <div id="reader"></div>
            <div class="scanner-status">
                <div class="ready" id="scannerStatus">
                    <span class="dot"></span> Arahkan QR Code
                </div>
            </div>
        </div>
        
        <button id="btnCamera" class="btn btn-camera" onclick="startCamera()">
            📸 Mulai Kamera
        </button>
        
        <button id="btnRetry" class="btn btn-outline" onclick="startCamera()" style="display:none;">
            🔄 Mulai Ulang Kamera
        </button>
        
        <!-- Notif -->
        <div class="notif-area">
            <h3><span class="live-dot"></span> Notifikasi</h3>
            <ul class="notif-list" id="notifList">
                <li class="empty-notif">📭 Menunggu scan QR...</li>
            </ul>
        </div>
        
        <div class="debug-panel" id="debugPanel"></div>
    </div>
    
    <div class="flash-overlay" id="flashOverlay"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzxSCaZecBS6Dfq6Y0WwZMSjjSqUWMcS084fgUqef_8dfFzAzNpozPv8WgmQEZtC9Gg/exec';
        
        let scanner = null;
        let isProcessing = false;
        let countSuccess = 0;
        let countError = 0;
        let hadirSet = {}; // Track yang sudah sukses
        let notifList = [];
        
        // LOG
        function log(msg) {
            const p = document.getElementById('debugPanel');
            p.style.display = 'block';
            p.innerHTML += '<br>' + msg;
            p.scrollTop = p.scrollHeight;
            console.log(msg);
        }
        
        // FLASH
        function flash() {
            const el = document.getElementById('flashOverlay');
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 150);
        }
        
        // API CALL
        function callAPI(action, params) {
            return new Promise(function(resolve, reject) {
                const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
                
                window[cb] = function(r) {
                    delete window[cb];
                    const s = document.getElementById(cb);
                    if (s) s.remove();
                    resolve(r);
                };
                
                const qs = Object.keys(params).map(function(k) {
                    return k + '=' + encodeURIComponent(params[k]);
                }).join('&');
                
                const url = API_URL + '?action=' + action + '&callback=' + cb + '&' + qs;
                
                const s = document.createElement('script');
                s.id = cb;
                s.src = url;
                s.onerror = function() {
                    delete window[cb];
                    reject(new Error('Network'));
                };
                document.body.appendChild(s);
                
                setTimeout(function() {
                    if (window[cb]) { delete window[cb]; reject(new Error('Timeout')); }
                }, 10000);
            });
        }
        
        // ADD NOTIF
        function addNotif(nama, jabatan, msg, type) {
            const waktu = new Date().toLocaleTimeString('id-ID');
            
            // Jangan duplikat notif untuk orang yang sama dalam 2 detik
            if (notifList.length > 0 && notifList[0].nama === nama && notifList[0].type === type) return;
            
            notifList.unshift({ nama, jabatan, msg, waktu, type });
            if (notifList.length > 50) notifList = notifList.slice(0, 50);
            
            renderNotif();
        }
        
        function renderNotif() {
            const list = document.getElementById('notifList');
            
            if (notifList.length === 0) {
                list.innerHTML = '<li class="empty-notif">📭 Menunggu scan QR...</li>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < notifList.length; i++) {
                const n = notifList[i];
                html += '<li class="' + n.type + '">';
                html += '<div class="avatar">' + (n.nama ? n.nama.charAt(0) : '?') + '</div>';
                html += '<div class="info">';
                html += '<div class="nama">' + (n.nama || '-') + '</div>';
                if (n.jabatan) html += '<div class="jabatan">' + n.jabatan + '</div>';
                html += '<div class="msg">' + n.msg + ' · ' + n.waktu + '</div>';
                html += '</div>';
                html += '<div class="icon-status">' + (n.type === 'success' ? '✅' : n.type === 'warning' ? '⚠️' : '❌') + '</div>';
                html += '</li>';
            }
            list.innerHTML = html;
        }
        
        // UPDATE COUNTER
        function updateCounter() {
            document.getElementById('countSuccess').textContent = countSuccess;
            document.getElementById('countError').textContent = countError;
            document.getElementById('countHadir').textContent = Object.keys(hadirSet).length;
        }
        
        // RESUME SCANNER
        function resumeScanner() {
            isProcessing = false;
            document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Arahkan QR Code';
            if (scanner) scanner.resume().catch(function() { startCamera(); });
        }
        
        // ============================================
        // AUTO ABSEN
        // ============================================
        async function autoAbsen(decodedText) {
            if (isProcessing) return;
            
            isProcessing = true;
            flash();
            
            document.getElementById('scannerStatus').innerHTML = '⏳ Memproses...';
            
            // Decode QR
            let nip = '', nama = '';
            
            try {
                const decoded = JSON.parse(atob(decodedText));
                
                if (decoded.type === 'personal_qr' && decoded.nip && decoded.nama) {
                    nip = decoded.nip;
                    nama = decoded.nama;
                } else {
                    addNotif('?', '', 'QR tidak dikenali', 'error');
                    countError++;
                    updateCounter();
                    resumeScanner();
                    return;
                }
            } catch(e) {
                addNotif('?', '', 'QR tidak valid', 'error');
                countError++;
                updateCounter();
                resumeScanner();
                return;
            }
            
            // Cek apakah sudah pernah sukses absen
            if (hadirSet[nip]) {
                addNotif(nama, '', 'Sudah absen sebelumnya', 'warning');
                // TIDAK menambah counter error
                updateCounter();
                resumeScanner();
                return;
            }
            
            // Auto check-in
            try {
                log('Auto check-in: ' + nip + ' - ' + nama);
                const result = await callAPI('checkIn', { nip, nama, lat: '', lng: '' });
                
                if (result.success) {
                    hadirSet[nip] = true;
                    countSuccess++;
                    addNotif(nama, '', result.message, 'success');
                } else {
                    if (result.alreadyAbsen) {
                        addNotif(nama, '', 'Sudah absen', 'warning');
                        // TIDAK menambah counter
                    } else {
                        countError++;
                        addNotif(nama, '', result.message, 'error');
                    }
                }
            } catch(e) {
                countError++;
                addNotif(nama, '', 'Gagal terhubung', 'error');
            }
            
            updateCounter();
            setTimeout(resumeScanner, 800);
        }
        
        // ============================================
        // CAMERA
        // ============================================
        async function startCamera() {
            log('Starting camera...');
            
            document.getElementById('btnCamera').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
            document.getElementById('cameraBox').style.display = 'block';
            document.getElementById('scannerStatus').innerHTML = '⏳ Membuka kamera...';
            
            if (scanner) {
                try { await scanner.stop(); } catch(e) {}
                try { scanner.clear(); } catch(e) {}
                scanner = null;
            }
            
            document.getElementById('reader').innerHTML = '';
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addNotif('System', '', 'Browser tidak support kamera', 'error');
                document.getElementById('btnRetry').style.display = 'block';
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                stream.getTracks().forEach(function(t) { t.stop(); });
                
                scanner = new Html5Qrcode("reader");
                
                await scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    function(text) {
                        scanner.pause();
                        autoAbsen(text);
                    },
                    function() {}
                );
                
                document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Arahkan QR Code';
                
            } catch(err) {
                log('Camera error: ' + err.message);
                addNotif('System', '', 'Gagal akses kamera', 'error');
                document.getElementById('cameraBox').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'block';
            }
        }
        
        // ============================================
        // INIT
        // ============================================
        window.addEventListener('load', function() {
            log('Ready');
            
            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                setTimeout(startCamera, 600);
            }
        });
        
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                if (scanner) scanner.pause();
            } else {
                if (scanner && !isProcessing) scanner.resume().catch(function() { startCamera(); });
            }
        });
    </script>
</body>
</html>
