<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi QR - Auto Scan</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .header { text-align: center; margin-bottom: 15px; }
        .header .icon { font-size: 42px; }
        .header h1 { 
            font-size: 20px; 
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0; 
        }
        .header p { color: #94a3b8; font-size: 12px; }
        
        /* STATS GRID - 4 kotak */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stat-box {
            text-align: center;
            padding: 12px 6px;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
        }
        
        .stat-box .num {
            font-size: 22px;
            font-weight: 700;
        }
        
        .stat-box .label {
            font-size: 9px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        
        .stat-total .num { color: #6366f1; }
        .stat-hadir .num { color: #10b981; }
        .stat-belum .num { color: #f59e0b; }
        .stat-persen .num { color: #3b82f6; }
        
        /* Progress bar */
        .progress-wrap {
            background: #f1f5f9;
            border-radius: 10px;
            height: 8px;
            margin: 8px 0 12px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #6366f1);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        /* Camera */
        .camera-box {
            background: #000;
            border-radius: 16px;
            margin: 10px 0;
            min-height: 280px;
            position: relative;
            overflow: hidden;
            border: 3px solid #6366f1;
        }
        
        #reader { width: 100%; border-radius: 13px; overflow: hidden; }
        #reader video { border-radius: 13px; object-fit: cover; }
        
        .scanner-status {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        
        .scanner-status .ready {
            color: white;
            font-size: 13px;
            font-weight: 600;
        }
        
        .scanner-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
            margin-right: 8px;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.5); }
        }
        
        /* Flash */
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
        }
        
        .flash-overlay.show {
            opacity: 0.6;
            transition: opacity 0s;
        }
        
        /* Notif */
        .notif-area { margin-top: 12px; }
        
        .notif-area h3 {
            font-size: 13px;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notif-area h3 .live {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .notif-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .notif-list li {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notif-list li.success {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
        }
        
        .notif-list li.error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }
        
        .notif-list li.warning {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
        }
        
        .notif-list .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .notif-list li.error .avatar { background: #ef4444; }
        .notif-list li.warning .avatar { background: #f59e0b; }
        
        .notif-list .info { flex: 1; min-width: 0; }
        .notif-list .nama { font-weight: 600; color: #1e293b; }
        .notif-list .jabatan { font-size: 11px; color: #6366f1; font-weight: 500; }
        .notif-list .pesan { font-size: 11px; color: #64748b; }
        .notif-list .waktu { font-size: 10px; color: #94a3b8; }
        
        .notif-list .icon-status { font-size: 22px; flex-shrink: 0; }
        
        .empty-notif { 
            text-align: center; 
            color: #94a3b8; 
            font-size: 12px; 
            padding: 20px; 
        }
        
        /* Buttons */
        .btn {
            display: block; width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: inherit; margin: 8px 0; transition: all 0.2s;
        }
        
        .btn-camera { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            font-size: 16px; 
            padding: 16px;
            box-shadow: 0 4px 15px rgba(16,185,129,0.3);
        }
        
        .btn-outline { 
            background: white; 
            color: #6366f1; 
            border: 2px solid #e2e8f0; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <h1>Absensi QR</h1>
            <p>Scan → Langsung Hadir ✅</p>
        </div>
        
        <!-- STATS: Total, Hadir, Belum, Persentase -->
        <div class="stats-grid">
            <div class="stat-box stat-total">
                <div class="num" id="totalPeserta">0</div>
                <div class="label">👥 Peserta</div>
            </div>
            <div class="stat-box stat-hadir">
                <div class="num" id="totalHadir">0</div>
                <div class="label">✅ Hadir</div>
            </div>
            <div class="stat-box stat-belum">
                <div class="num" id="totalBelum">0</div>
                <div class="label">⏳ Belum</div>
            </div>
            <div class="stat-box stat-persen">
                <div class="num" id="persentase">0%</div>
                <div class="label">📈 Hadir</div>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>
        
        <!-- Camera -->
        <div class="camera-box" id="cameraBox">
            <div id="reader"></div>
            <div class="scanner-status">
                <div class="ready" id="scannerStatus">
                    <span class="dot"></span> Arahkan QR Code
                </div>
            </div>
        </div>
        
        <button id="btnCamera" class="btn btn-camera" onclick="startCamera()">
            📸 Mulai Kamera
        </button>
        
        <button id="btnRetry" class="btn btn-outline" onclick="startCamera()" style="display:none;">
            🔄 Mulai Ulang
        </button>
        
        <!-- Notifikasi -->
        <div class="notif-area">
            <h3><span class="live"></span> Notifikasi Real-time</h3>
            <ul class="notif-list" id="notifList">
                <li class="empty-notif">📭 Menunggu scan QR...</li>
            </ul>
        </div>
    </div>
    
    <div class="flash-overlay" id="flashOverlay"></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzxSCaZecBS6Dfq6Y0WwZMSjjSqUWMcS084fgUqef_8dfFzAzNpozPv8WgmQEZtC9Gg/exec';
        
        let scanner = null;
        let isProcessing = false;
        let notifList = [];
        
        function flash() {
            const el = document.getElementById('flashOverlay');
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 150);
        }
        
        function callAPI(action, params) {
            return new Promise(function(resolve, reject) {
                const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
                
                window[cb] = function(r) {
                    delete window[cb];
                    const s = document.getElementById(cb);
                    if (s) s.remove();
                    resolve(r);
                };
                
                const qs = Object.keys(params).map(function(k) {
                    return k + '=' + encodeURIComponent(params[k]);
                }).join('&');
                
                const url = API_URL + '?action=' + action + '&callback=' + cb + '&' + qs;
                
                const s = document.createElement('script');
                s.id = cb;
                s.src = url;
                s.onerror = function() { delete window[cb]; reject(new Error('Network')); };
                document.body.appendChild(s);
                
                setTimeout(function() {
                    if (window[cb]) { delete window[cb]; reject(new Error('Timeout')); }
                }, 10000);
            });
        }
        
        // Update stats dari API
        async function updateStats() {
            try {
                const r = await callAPI('getStats', {});
                if (r.success) {
                    document.getElementById('totalPeserta').textContent = r.totalPeserta;
                    document.getElementById('totalHadir').textContent = r.totalHadir;
                    document.getElementById('totalBelum').textContent = r.totalBelum;
                    document.getElementById('persentase').textContent = r.persentase + '%';
                    document.getElementById('progressBar').style.width = r.persentase + '%';
                }
            } catch(e) {}
        }
        
        // Tambah notif dengan NAMA + JABATAN
        function addNotif(nama, jabatan, msg, type) {
            const waktu = new Date().toLocaleTimeString('id-ID');
            
            notifList.unshift({ nama, jabatan, msg, waktu, type });
            if (notifList.length > 50) notifList = notifList.slice(0, 50);
            
            renderNotif();
        }
        
        function renderNotif() {
            const list = document.getElementById('notifList');
            
            if (notifList.length === 0) {
                list.innerHTML = '<li class="empty-notif">📭 Menunggu scan QR...</li>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < notifList.length; i++) {
                const n = notifList[i];
                const icon = n.type === 'success' ? '✅' : n.type === 'warning' ? '⚠️' : '❌';
                
                html += '<li class="' + n.type + '">';
                html += '<div class="avatar">' + (n.nama ? n.nama.charAt(0) : '?') + '</div>';
                html += '<div class="info">';
                html += '<div class="nama">' + (n.nama || '-') + '</div>';
                if (n.jabatan) html += '<div class="jabatan">' + n.jabatan + '</div>';
                html += '<div class="pesan">' + n.msg + '</div>';
                html += '<div class="waktu">' + n.waktu + '</div>';
                html += '</div>';
                html += '<div class="icon-status">' + icon + '</div>';
                html += '</li>';
            }
            list.innerHTML = html;
        }
        
        function resumeScanner() {
            isProcessing = false;
            document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Arahkan QR Code';
            if (scanner) scanner.resume().catch(function() { startCamera(); });
        }
        
        // AUTO ABSEN
        async function autoAbsen(decodedText) {
            if (isProcessing) return;
            
            isProcessing = true;
            flash();
            document.getElementById('scannerStatus').innerHTML = '⏳ Memproses...';
            
            let nip = '', nama = '';
            
            try {
                const decoded = JSON.parse(atob(decodedText));
                if (decoded.type === 'personal_qr' && decoded.nip && decoded.nama) {
                    nip = decoded.nip;
                    nama = decoded.nama;
                } else {
                    addNotif('Tidak dikenal', '', 'QR tidak valid', 'error');
                    updateStats();
                    resumeScanner();
                    return;
                }
            } catch(e) {
                addNotif('Error', '', 'QR tidak bisa dibaca', 'error');
                updateStats();
                resumeScanner();
                return;
            }
            
            // Check-in
            try {
                const result = await callAPI('checkIn', { nip, nama, lat: '', lng: '' });
                
                if (result.success) {
                    // Ambil data peserta untuk dapat jabatan
                    const pesertaData = await callAPI('getPeserta', {});
                    let jabatan = '';
                    if (pesertaData.success) {
                        for (let i = 0; i < pesertaData.data.length; i++) {
                            if (pesertaData.data[i].nip === nip) {
                                jabatan = pesertaData.data[i].jabatan || '';
                                break;
                            }
                        }
                    }
                    
                    addNotif(nama, jabatan, result.message, 'success');
                } else {
                    if (result.alreadyAbsen) {
                        addNotif(nama, '', 'Sudah absen sebelumnya', 'warning');
                    } else {
                        addNotif(nama, '', result.message, 'error');
                    }
                }
                
                // Update stats setiap kali ada scan
                updateStats();
                
            } catch(e) {
                addNotif(nama, '', 'Gagal terhubung', 'error');
                updateStats();
            }
            
            setTimeout(resumeScanner, 800);
        }
        
        // CAMERA
        async function startCamera() {
            document.getElementById('btnCamera').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
            document.getElementById('cameraBox').style.display = 'block';
            document.getElementById('scannerStatus').innerHTML = '⏳ Membuka kamera...';
            
            if (scanner) {
                try { await scanner.stop(); } catch(e) {}
                try { scanner.clear(); } catch(e) {}
                scanner = null;
            }
            
            document.getElementById('reader').innerHTML = '';
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addNotif('System', '', 'Browser tidak support', 'error');
                document.getElementById('btnRetry').style.display = 'block';
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                stream.getTracks().forEach(function(t) { t.stop(); });
                
                scanner = new Html5Qrcode("reader");
                
                await scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    function(text) { scanner.pause(); autoAbsen(text); },
                    function() {}
                );
                
                document.getElementById('scannerStatus').innerHTML = '<span class="dot"></span> Arahkan QR Code';
                
            } catch(err) {
                addNotif('System', '', 'Gagal kamera: ' + err.message, 'error');
                document.getElementById('cameraBox').style.display = 'none';
                document.getElementById('btnRetry').style.display = 'block';
            }
        }
        
        // INIT
        window.addEventListener('load', function() {
            // Load stats awal
            updateStats();
            
            // Auto camera untuk mobile
            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                setTimeout(startCamera, 600);
            }
            
            // Refresh stats setiap 15 detik
            setInterval(updateStats, 15000);
        });
        
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                if (scanner) scanner.pause();
            } else {
                if (scanner && !isProcessing) {
                    scanner.resume().catch(function() { startCamera(); });
                    updateStats();
                }
            }
        });
    </script>
</body>
</html>
